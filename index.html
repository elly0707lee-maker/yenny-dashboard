<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#eff5fb">
  <title>Money Plus Board · 4자토크 연구실</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-row header-row-top">
      <div class="logo">
        <div class="logo-stack">
          <div class="logo-mark">MONEY PLUS<span class="logo-dot">·</span>BOARD</div>
          <div class="logo-sub">4자토크 연구실</div>
        </div>
      </div>

      <div class="header-actions">
        <button id="btn-add" class="btn-add">
          <span class="plus-icon">＋</span>
          <span class="btn-add-label">메모 추가</span>
        </button>
        <div class="kebab-wrap">
          <button id="btn-menu" class="kebab-btn" title="더보기">⋮</button>
          <div id="kebab-menu" class="kebab-menu hidden">
            <button class="kebab-item danger" data-action="reset">
              <span class="kebab-icon">↺</span>
              <span>전체 초기화 — 새 방송 시작</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="header-row header-row-bottom">
      <button id="btn-date" class="date-pill" title="방송 일자 변경">
        <span class="date-icon">📅</span>
        <span id="date-display">방송일 설정</span>
      </button>
      <input type="date" id="date-input" class="hidden-date">

      <div id="user-pill" class="user-pill">
        <span class="dot"></span>
        <span id="user-name">접속 중...</span>
        <button id="btn-change-name" class="btn-link">변경</button>
      </div>
    </div>
  </header>

  <nav id="filter-bar" class="filter-bar">
    <button class="filter-pill active" data-filter="all">전체 <span class="count" id="count-all">0</span></button>
    <button class="filter-pill" data-filter="confirmed"><span class="icon">✓</span> 확정 <span class="count" id="count-confirmed">0</span></button>
    <button class="filter-pill" data-filter="cg"><span class="icon">●</span> CG <span class="count" id="count-cg">0</span></button>
    <button class="filter-pill" data-filter="sequence"><span class="icon">Q</span> 방송 순서 <span class="count" id="count-sequence">0</span></button>
  </nav>

  <main id="board" class="board"></main>

  <footer class="lower-third">
    <span class="live-indicator">LIVE</span>
    <span class="ticker" id="ticker">실시간 협업 보드 · 메모를 추가하면 다른 접속자에게 즉시 반영됩니다</span>
    <span class="status-meta">
      <span class="status-label">접속</span>
      <span id="connected-count" class="connected-count">1</span>
      <span class="status-label">명</span>
    </span>
  </footer>

  <!-- Name Modal -->
  <div id="name-modal" class="modal-backdrop hidden">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">4자토크 연구실 입장</div>
      <p class="modal-desc">메모에 표시될 이름을 알려주세요</p>
      <div class="modal-body">
        <input id="name-input" type="text" class="modal-input" placeholder="예) 예니" maxlength="20" autocomplete="off">
        <div class="modal-actions">
          <button id="name-save" class="btn-primary">입장하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Category Modal -->
  <div id="category-modal" class="modal-backdrop hidden">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">메모 종류 선택</div>
      <p class="modal-desc">먼저 카테고리를 고르고, 작성한 뒤 ✓확정 / ●CG 표시를 추가할 수 있어요</p>
      <div class="modal-body">
        <div class="category-picker">
          <button class="category-option" data-category="index">
            <span class="cat-bar" style="background:#5290cf;"></span>
            <span>지수</span>
            <span class="cat-en">INDEX</span>
          </button>
          <button class="category-option" data-category="sector">
            <span class="cat-bar" style="background:#5fa885;"></span>
            <span>섹터</span>
            <span class="cat-en">SECTOR</span>
          </button>
          <button class="category-option" data-category="stocks">
            <span class="cat-bar" style="background:#d27a5a;"></span>
            <span>종목</span>
            <span class="cat-en">STOCKS</span>
          </button>
          <button class="category-option" data-category="supply">
            <span class="cat-bar" style="background:#8e74bb;"></span>
            <span>수급</span>
            <span class="cat-en">LIQUIDITY</span>
          </button>
          <button class="category-option" data-category="us">
            <span class="cat-bar" style="background:#3a5a82;"></span>
            <span>미증시</span>
            <span class="cat-en">US</span>
          </button>
          <button class="category-option" data-category="news">
            <span class="cat-bar" style="background:#b89e44;"></span>
            <span>뉴스</span>
            <span class="cat-en">NEWS</span>
          </button>
          <button class="category-option full-width" data-category="caster">
            <span class="cat-bar" style="background:#b66890;"></span>
            <span>캐스터 브리핑</span>
            <span class="cat-en">CASTER</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Reset Modal -->
  <div id="reset-modal" class="modal-backdrop hidden">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">전체 초기화</div>
      <p class="modal-desc">현재 보드의 <strong>모든 메모가 삭제</strong>됩니다.<br>되돌릴 수 없어요. 새 방송 준비를 시작하실 거면 진행하세요.</p>
      <div class="modal-body">
        <div class="modal-actions">
          <button id="reset-cancel" class="btn-secondary">취소</button>
          <button id="reset-confirm" class="btn-danger">전체 초기화</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
